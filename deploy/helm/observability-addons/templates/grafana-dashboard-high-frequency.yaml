apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-addons-dashboard-high-frequency
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  delivery-lab-high-frequency.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (status) (rate(http_server_requests_seconds_count{application=\"blog-api\",uri=\"/api/posts\"}[1m]))",
              "legendFormat": "status {{`{{status}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "API Posts QPS by Status",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{application=\"blog-api\",uri=\"/api/posts\"}[1m])))",
              "legendFormat": "p95",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket{application=\"blog-api\",uri=\"/api/posts\"}[1m])))",
              "legendFormat": "p99",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "API Posts Tail Latency",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "id": 3,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(apisix_http_requests_total[1m]))",
              "legendFormat": "all gateway requests",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Gateway QPS",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 9
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg(apisix_nginx_http_current_connections{state=\"active\"})",
              "legendFormat": "active",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "avg(apisix_nginx_http_current_connections{state=\"reading\"})",
              "legendFormat": "reading",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "avg(apisix_nginx_http_current_connections{state=\"writing\"})",
              "legendFormat": "writing",
              "range": true,
              "refId": "C"
            },
            {
              "editorMode": "code",
              "expr": "avg(apisix_nginx_http_current_connections{state=\"waiting\"})",
              "legendFormat": "waiting",
              "range": true,
              "refId": "D"
            }
          ],
          "title": "Gateway Connections",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 18
          },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(up{job=~\"blog-api-blog-api|apisix-prometheus-metrics|alloy\"} == 0)",
              "legendFormat": "",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Critical Target Failures",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 18
          },
          "id": 6,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (pod) (jvm_threads_live_threads{application=\"blog-api\"})",
              "legendFormat": "{{`{{pod}}`}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Live Threads by Pod",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "enterprise-cloud-lab",
        "high-frequency"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Enterprise Delivery Lab High Frequency",
      "uid": "enterprise-delivery-high-frequency",
      "version": 1,
      "weekStart": ""
    }
