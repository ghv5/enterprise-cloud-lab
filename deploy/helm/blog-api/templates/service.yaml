apiVersion: v1
kind: Service
metadata:
  name: {{ include "blog-api.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "blog-api.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "blog-api.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
