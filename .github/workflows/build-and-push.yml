name: build-and-push

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'ops/docker/**'
      - 'pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - 'ci/github-actions/build-and-push.yml'
      - '.github/workflows/build-and-push.yml'

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-java:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - run: ./mvnw -B -ntp verify

      - uses: actions/upload-artifact@v4
        with:
          name: java-app-jars
          path: |
            apps/blog-api/target/blog-api.jar
            apps/admin-server/target/admin-server-0.1.0-SNAPSHOT.jar
            apps/api-gateway/target/api-gateway-0.1.0-SNAPSHOT.jar
            apps/user-service/target/user-service-0.1.0-SNAPSHOT.jar
            apps/order-service/target/order-service-0.1.0-SNAPSHOT.jar

  build-and-push:
    needs: verify-java
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: blog-api
            context: apps/blog-api
            dockerfile: apps/blog-api/Dockerfile.local
            build_args: ''
          - image: blog-web
            context: apps/blog-web
            dockerfile: apps/blog-web/Dockerfile
            build_args: ''
          - image: enterprise-cloud-lab-admin-server
            context: .
            dockerfile: ops/docker/Dockerfile.java
            build_args: JAR_FILE=apps/admin-server/target/admin-server-0.1.0-SNAPSHOT.jar
          - image: enterprise-cloud-lab-api-gateway
            context: .
            dockerfile: ops/docker/Dockerfile.java
            build_args: JAR_FILE=apps/api-gateway/target/api-gateway-0.1.0-SNAPSHOT.jar
          - image: enterprise-cloud-lab-user-service
            context: .
            dockerfile: ops/docker/Dockerfile.java
            build_args: JAR_FILE=apps/user-service/target/user-service-0.1.0-SNAPSHOT.jar
          - image: enterprise-cloud-lab-order-service
            context: .
            dockerfile: ops/docker/Dockerfile.java
            build_args: JAR_FILE=apps/order-service/target/order-service-0.1.0-SNAPSHOT.jar

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: java-app-jars
          path: .

      - name: Login to GHCR
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ matrix.build_args == '' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest

      - name: Build and push Java image
        if: ${{ matrix.build_args != '' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest
