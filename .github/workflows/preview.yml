name: preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  REMOTE_PREVIEW_ROOT: /Users/mac/pspace/deploy/enterprise-cloud-lab

jobs:
  package-jars:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - run: ./mvnw -B -ntp verify

      - uses: actions/upload-artifact@v4
        with:
          name: preview-java-jars
          path: |
            apps/admin-server/target/admin-server-0.1.0-SNAPSHOT.jar
            apps/api-gateway/target/api-gateway-0.1.0-SNAPSHOT.jar
            apps/user-service/target/user-service-0.1.0-SNAPSHOT.jar
            apps/order-service/target/order-service-0.1.0-SNAPSHOT.jar

  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: package-jars
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin-server
            image: enterprise-cloud-lab-admin-server
            jar: apps/admin-server/target/admin-server-0.1.0-SNAPSHOT.jar
          - service: api-gateway
            image: enterprise-cloud-lab-api-gateway
            jar: apps/api-gateway/target/api-gateway-0.1.0-SNAPSHOT.jar
          - service: user-service
            image: enterprise-cloud-lab-user-service
            jar: apps/user-service/target/user-service-0.1.0-SNAPSHOT.jar
          - service: order-service
            image: enterprise-cloud-lab-order-service
            jar: apps/order-service/target/order-service-0.1.0-SNAPSHOT.jar

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: preview-java-jars
          path: .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/Dockerfile.java
          push: true
          build-args: |
            JAR_FILE=${{ matrix.jar }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:pr-${{ github.event.pull_request.number }}

  ship-preview-compose:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v5

      - name: Copy preview compose to local SSH target
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LOCAL_SSH_HOST }}
          username: ${{ secrets.LOCAL_SSH_USER }}
          key: ${{ secrets.LOCAL_SSH_KEY }}
          source: ops/docker/docker-compose.preview.yml
          target: /tmp/enterprise-cloud-lab-preview-${{ github.event.pull_request.number }}
          strip_components: 2

      - name: Deploy preview stack over SSH to local Mac
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LOCAL_SSH_HOST }}
          username: ${{ secrets.LOCAL_SSH_USER }}
          key: ${{ secrets.LOCAL_SSH_KEY }}
          script: |
            set -euo pipefail

            PR_NUMBER=${{ github.event.pull_request.number }}
            PREVIEW_ROOT="${{ env.REMOTE_PREVIEW_ROOT }}/pr-${PR_NUMBER}"
            COMPOSE_FILE="${PREVIEW_ROOT}/docker-compose.preview.yml"
            ENV_FILE="${PREVIEW_ROOT}/.env"
            GATEWAY_PORT=$((20000 + PR_NUMBER))
            ADMIN_SERVER_PORT=$((21000 + PR_NUMBER))

            mkdir -p "${PREVIEW_ROOT}"
            mv "/tmp/enterprise-cloud-lab-preview-${PR_NUMBER}/docker-compose.preview.yml" "${COMPOSE_FILE}"

            cat > "${ENV_FILE}" <<EOF
            COMPOSE_PROJECT_NAME=enterprise-lab-preview-pr-${PR_NUMBER}
            ADMIN_SERVER_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/enterprise-cloud-lab-admin-server:pr-${PR_NUMBER}
            API_GATEWAY_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/enterprise-cloud-lab-api-gateway:pr-${PR_NUMBER}
            USER_SERVICE_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/enterprise-cloud-lab-user-service:pr-${PR_NUMBER}
            ORDER_SERVICE_IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/enterprise-cloud-lab-order-service:pr-${PR_NUMBER}
            GATEWAY_PORT=${GATEWAY_PORT}
            ADMIN_SERVER_PORT=${ADMIN_SERVER_PORT}
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            cd "${PREVIEW_ROOT}"
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" pull
            docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" up -d

  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Destroy preview stack over SSH on local Mac
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LOCAL_SSH_HOST }}
          username: ${{ secrets.LOCAL_SSH_USER }}
          key: ${{ secrets.LOCAL_SSH_KEY }}
          script: |
            set -euo pipefail

            PR_NUMBER=${{ github.event.pull_request.number }}
            PREVIEW_ROOT="${{ env.REMOTE_PREVIEW_ROOT }}/pr-${PR_NUMBER}"
            COMPOSE_FILE="${PREVIEW_ROOT}/docker-compose.preview.yml"
            ENV_FILE="${PREVIEW_ROOT}/.env"

            if [ -d "${PREVIEW_ROOT}" ]; then
              cd "${PREVIEW_ROOT}"
              docker compose --env-file "${ENV_FILE}" -f "${COMPOSE_FILE}" down --remove-orphans || true
              rm -rf "${PREVIEW_ROOT}"
            fi
