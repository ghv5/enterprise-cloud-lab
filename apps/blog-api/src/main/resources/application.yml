server:
  port: ${PORT:8080}

spring:
  application:
    name: blog-api

app:
  version: ${APP_VERSION:dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      version: ${app.version}
    distribution:
      percentiles-histogram:
        http.server.requests: true
