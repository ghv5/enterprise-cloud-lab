name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - release/**

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - run: ./mvnw -B -ntp verify
