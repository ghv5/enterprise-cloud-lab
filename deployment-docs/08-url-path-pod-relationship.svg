<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#059669"/>
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 15px Arial, sans-serif; fill: #475569; }
      .zone { stroke: #cbd5e1; stroke-width: 1.5; rx: 18; ry: 18; }
      .zone-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box { stroke: #94a3b8; stroke-width: 1.5; rx: 12; ry: 12; }
      .box-title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .box-sub { font: 400 13px Arial, sans-serif; fill: #475569; }
      .note { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .legend { font: 400 13px Arial, sans-serif; fill: #334155; }
      .main { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .dep { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow-gray); }
      .obs { stroke: #059669; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-green); }
      .rule { stroke: #7c3aed; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow-gray); }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1500" height="980"/>

  <text x="42" y="52" class="title">URL 访问路径下的 Pod 关系示意图</text>
  <text x="42" y="80" class="sub">观察 URL：GET http://127.0.0.1:30080/prod-api/auth/code</text>

  <line x1="1040" y1="54" x2="1110" y2="54" class="main"/>
