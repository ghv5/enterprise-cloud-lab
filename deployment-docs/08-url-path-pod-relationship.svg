  <rect class="box" x="1310" y="190" width="105" height="70" fill="#fecaca"/>
  <text x="1342" y="222" class="box-title">redis</text>
  <text x="1328" y="244" class="box-sub">验证码缓存</text>

  <rect class="box" x="1180" y="315" width="105" height="70" fill="#fed7aa"/>
  <text x="1212" y="347" class="box-title">mysql</text>
  <text x="1194" y="369" class="box-sub">业务 / 配置库</text>

  <rect class="box" x="1310" y="315" width="105" height="70" fill="#e9d5ff"/>
  <text x="1340" y="347" class="box-title">kafka</text>
  <text x="1322" y="369" class="box-sub">消息基础设施</text>

  <rect class="zone" x="1140" y="500" width="310" height="320" fill="#ecfdf5"/>
  <text x="1164" y="534" class="zone-title">observability namespace</text>

  <rect class="box" x="1174" y="570" width="112" height="70" fill="#dcfce7"/>
  <text x="1192" y="602" class="box-title">prometheus</text>
  <text x="1198" y="624" class="box-sub">指标抓取</text>

  <rect class="box" x="1305" y="570" width="112" height="70" fill="#d1fae5"/>
  <text x="1334" y="602" class="box-title">grafana</text>
  <text x="1328" y="624" class="box-sub">指标 / 日志</text>

  <rect class="box" x="1174" y="690" width="112" height="70" fill="#ccfbf1"/>
  <text x="1206" y="722" class="box-title">alloy</text>
  <text x="1194" y="744" class="box-sub">日志采集</text>

  <rect class="box" x="1305" y="690" width="112" height="70" fill="#a7f3d0"/>
  <text x="1340" y="722" class="box-title">loki</text>
  <text x="1328" y="744" class="box-sub">日志存储</text>

  <rect class="box" x="1174" y="785" width="243" height="30" fill="#bbf7d0"/>
  <text x="1212" y="805" class="box-sub">skywalking-oap / ui：链路追踪</text>

  <path class="main" d="M283 268 L398 268"/>
  <text x="308" y="250" class="note">NodePort</text>

  <path class="main" d="M603 268 C655 268 655 229 720 229"/>
  <text x="610" y="232" class="note">/prod-api/*</text>

  <path class="main" d="M880 229 L910 229"/>
  <text x="880" y="212" class="note">/auth/code</text>

  <path class="rule" d="M500 502 L500 600"/>
  <text x="514" y="558" class="note">配置落 etcd</text>

  <path class="rule" d="M500 410 L500 316"/>
  <text x="514" y="372" class="note">同步给 APISIX</text>

  <path class="dep" d="M800 273 C800 305 1190 170 1228 190"/>
  <path class="dep" d="M985 273 C985 305 1195 170 1228 190"/>
  <path class="dep" d="M795 360 C795 300 1175 300 1230 260"/>

  <path class="dep" d="M985 273 C1050 285 1265 260 1358 260"/>
  <path class="dep" d="M795 442 C845 485 1182 410 1232 385"/>
  <path class="dep" d="M1232 260 L1232 315"/>
  <text x="1135" y="285" class="note">Nacos 依赖 MySQL</text>

  <path class="obs" d="M500 316 C530 825 1110 610 1174 605"/>
  <path class="obs" d="M800 273 C950 470 1100 585 1174 605"/>
  <path class="obs" d="M985 273 C1080 455 1125 585 1174 605"/>

  <path class="obs" d="M800 273 C950 640 1100 725 1174 725"/>
  <path class="obs" d="M985 273 C1080 620 1125 715 1174 725"/>
  <path class="obs" d="M1286 725 L1305 725"/>
  <path class="obs" d="M1286 605 L1305 605"/>

  <path class="obs" d="M800 273 C980 830 1110 805 1174 800"/>
  <path class="obs" d="M985 273 C1090 815 1120 805 1174 800"/>

  <rect x="42" y="855" width="1408" height="88" rx="14" ry="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="66" y="884" class="box-title">读图顺序</text>
  <text x="66" y="912" class="box-sub">1. 蓝线：真实 URL 主路径，Browser -> APISIX -> gateway -> auth。</text>
  <text x="66" y="934" class="box-sub">2. 灰线：服务依赖，业务服务启动和运行依赖 Nacos / Redis / MySQL；Kafka 当前不在该 URL 主链路上。</text>
  <text x="700" y="912" class="box-sub">3. 绿虚线：观测路径，Prometheus 抓指标，Alloy 采日志到 Loki，SkyWalking 接收 trace。</text>
</svg>
