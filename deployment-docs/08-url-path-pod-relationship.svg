  <text x="104" y="280" class="box-sub">127.0.0.1:30080</text>

  <rect class="zone" x="360" y="120" width="280" height="700" fill="#eff6ff"/>
  <text x="384" y="154" class="zone-title">apisix namespace</text>

  <rect class="box" x="398" y="220" width="205" height="96" fill="#dbeafe"/>
  <text x="426" y="254" class="box-title">apisix</text>
  <text x="426" y="280" class="box-sub">数据面</text>

  <rect class="box" x="398" y="410" width="205" height="92" fill="#e0f2fe"/>
