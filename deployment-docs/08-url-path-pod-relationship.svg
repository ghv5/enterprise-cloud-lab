  <line x1="1040" y1="78" x2="1110" y2="78" class="dep"/>
  <text x="1120" y="83" class="legend">服务依赖</text>
  <line x1="1230" y1="78" x2="1300" y2="78" class="obs"/>
  <text x="1310" y="83" class="legend">观测采集</text>

  <rect class="zone" x="40" y="120" width="280" height="700" fill="#f1f5f9"/>
