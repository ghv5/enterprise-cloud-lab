{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ruoyi-backend.serviceFullname" (dict "root" $ "name" $name) }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: ruoyi-backend
spec:
  type: {{ $svc.service.type }}
  selector:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - name: http
      port: {{ $svc.service.port }}
      targetPort: http
  {{- range $svc.extraPorts }}
    - name: {{ .name }}
      port: {{ .servicePort }}
      targetPort: {{ .name }}
  {{- end }}
---
{{- end }}
{{- end }}
