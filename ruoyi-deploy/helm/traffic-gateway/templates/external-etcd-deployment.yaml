apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.externalEtcd.serviceName }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: external-etcd
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-etcd
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: etcd
          image: {{ .Values.externalEtcd.image }}
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/etcd
          args:
            - --name=etcd-0
            - --data-dir=/etcd-data
            - --advertise-client-urls=http://{{ .Values.externalEtcd.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --initial-advertise-peer-urls=http://{{ .Values.externalEtcd.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:2380
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-cluster=etcd-0=http://{{ .Values.externalEtcd.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:2380
            - --initial-cluster-state=new
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
{{ toYaml .Values.externalEtcd.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: /etcd-data
      volumes:
        - name: data
          emptyDir: {}
