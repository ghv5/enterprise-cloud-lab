apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.externalEtcd.serviceName }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app.kubernetes.io/name: external-etcd
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
