{{- if .Values.mysql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-infra.mysql.fullname" . }}
spec:
  type: {{ .Values.mysql.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "platform-infra.mysql.fullname" . }}
  ports:
    - name: mysql
      port: {{ .Values.mysql.service.port }}
      targetPort: mysql
{{- end }}
