{{- if .Values.redis.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform-infra.redis.fullname" . }}
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    appendonly yes
    dir /data
    {{- if .Values.redis.auth.enabled }}
    requirepass {{ .Values.redis.auth.password }}
    {{- end }}
{{- end }}
