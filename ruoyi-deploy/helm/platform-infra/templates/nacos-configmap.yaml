{{- if .Values.nacos.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform-infra.nacos.fullname" . }}
data:
  application.properties: |
    server.servlet.contextPath=/nacos
    server.error.include-message=ALWAYS
    server.port=8848
    spring.application.name=ruoyi-nacos
    nacos.plugin.datasource.log.enabled=true
    spring.sql.init.platform=mysql
    db.num=1
    db.url.0=jdbc:mysql://{{ default (include "platform-infra.mysql.fullname" .) .Values.nacos.database.host }}:{{ .Values.nacos.database.port }}/{{ .Values.nacos.database.name }}?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    db.user.0={{ .Values.nacos.database.username }}
    db.password.0={{ .Values.nacos.database.password }}
    spring.boot.admin.client.url={{ .Values.nacos.adminClient.url }}
    spring.boot.admin.client.username={{ .Values.nacos.adminClient.username }}
    spring.boot.admin.client.password={{ .Values.nacos.adminClient.password }}
    spring.boot.admin.client.instance.service-host-type=IP
    spring.boot.admin.client.instance.metadata.username=${spring.boot.admin.client.username}
    spring.boot.admin.client.instance.metadata.userpassword=${spring.boot.admin.client.password}
    management.endpoints.web.exposure.include=*
    nacos.security.ignore.urls=/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-ui/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**
    nacos.core.auth.system.type=nacos
    nacos.core.auth.enabled=true
    nacos.core.auth.caching.enabled=true
    nacos.core.auth.enable.userAgentAuthWhite=false
    nacos.core.auth.server.identity.key={{ .Values.nacos.auth.identityKey }}
    nacos.core.auth.server.identity.value={{ .Values.nacos.auth.identityValue }}
    nacos.core.auth.plugin.nacos.token.cache.enable=false
    nacos.core.auth.plugin.nacos.token.expire.seconds=18000
    nacos.core.auth.plugin.nacos.token.secret.key={{ .Values.nacos.auth.tokenSecretKey }}
    nacos.istio.mcp.server.enabled=false
{{- end }}
