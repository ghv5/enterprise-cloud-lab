{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform-infra.redis.fullname" . }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "platform-infra.redis.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "platform-infra.redis.fullname" . }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - redis-server
            - /redis-master/redis.conf
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
{{ toYaml .Values.redis.resources | indent 12 }}
          volumeMounts:
            - name: redis-config
              mountPath: /redis-master/redis.conf
              subPath: redis.conf
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-config
          configMap:
            name: {{ include "platform-infra.redis.fullname" . }}
        - name: redis-data
{{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "platform-infra.redis.fullname" . }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- end }}
