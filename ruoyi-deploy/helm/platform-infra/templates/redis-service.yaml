{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-infra.redis.fullname" . }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "platform-infra.redis.fullname" . }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
{{- end }}
