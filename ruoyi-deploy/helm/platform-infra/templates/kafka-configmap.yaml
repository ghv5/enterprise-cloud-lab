{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform-infra.kafka.fullname" . }}
data:
  server.properties: |
    process.roles=broker,controller
    node.id={{ .Values.kafka.kraft.nodeId }}
    controller.quorum.voters={{ .Values.kafka.kraft.nodeId }}@{{ include "platform-infra.kafka.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.kafka.service.controllerPort }}
    listeners=PLAINTEXT://:{{ .Values.kafka.service.clientPort }},CONTROLLER://:{{ .Values.kafka.service.controllerPort }}
    advertised.listeners=PLAINTEXT://{{ include "platform-infra.kafka.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.kafka.service.clientPort }}
    listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=PLAINTEXT
    log.dirs=/var/lib/kafka/data
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
{{- end }}
